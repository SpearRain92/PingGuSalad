<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐧 핑구네 가계부 분석</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- LZString (데이터 압축용) -->
  <script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --primary-color: #0ea5e9;
      --primary-hover: #0284c7;
      --background-color: #f1f5f9;
      --card-background-color: #ffffff;
      --text-color: #1e293b;
      --muted-text-color: #64748b;
      --border-color: #e2e8f0;
      --border-radius: 0.75rem;
    }
    body { 
      background-color: var(--background-color); 
      color: var(--text-color); 
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .card {
      background-color: var(--card-background-color);
      border-radius: var(--border-radius);
      border: 1px solid var(--border-color);
      box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.625rem 1rem;
      border-radius: 0.5rem;
      font-weight: 600;
      transition: all 0.2s ease;
      cursor: pointer;
      border: 1px solid transparent;
      text-decoration: none; 
    }
    .btn-primary {
      background-color: #0ea5e9; 
      color: white;
      box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
    }
    .btn-primary:hover { background-color: #0284c7; }
    .btn-secondary {
        background-color: #f8fafc;
        color: #334155;
        border-color: #e2e8f0;
    }
    .btn-secondary:hover { background-color: #f1f5f9; }
    .btn:disabled {
      background-color: #94a3b8; 
      cursor: not-allowed;
      opacity: 0.7;
    }
    .file-input-wrapper {
        border: 2px dashed var(--border-color);
        border-radius: var(--border-radius);
        padding: 2rem 1rem;
        text-align: center;
        transition: border-color 0.2s ease;
    }
    .file-input-wrapper.dragover { border-color: var(--primary-color); }
    .file-input {
      width: 100%;
      border: 1px solid var(--border-color);
      background-color: #f8fafc; 
      border-radius: 0.5rem;
      font-size: 0.875rem;
    }
    .file-input::file-selector-button {
      margin-right: 0.75rem;
      border: 0;
      background: var(--primary-color);
      color: white;
      padding: 0.5rem 0.75rem;
      border-radius: 0.375rem 0 0 0.375rem;
      cursor: pointer;
      font-weight: 500;
      transition: background-color 0.2s ease;
    }
     .file-input::file-selector-button:hover { background-color: var(--primary-hover); }
    .tab-btn {
        padding: 0.5rem 1rem;
        font-weight: 600;
        border-radius: 0.5rem;
        cursor: pointer;
        color: var(--muted-text-color);
        border-bottom: 2px solid transparent;
        transition: all 0.2s ease;
    }
    .tab-btn.active {
        color: var(--primary-color);
        border-bottom-color: var(--primary-color);
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 50;
    }
    .modal-content {
        background-color: white;
        border-radius: var(--border-radius);
        width: 90%;
        max-width: 800px;
        max-height: 90vh;
        display: flex;
        flex-direction: column;
    }
    .hidden { display: none; }
  </style>
</head>
<body class="min-h-screen">
  <!-- Header -->
  <header class="bg-white shadow-sm sticky top-0 z-20">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-3">
          <div class="h-8 w-8 rounded-lg grid place-items-center text-2xl">🐧</div>
          <h1 class="text-xl font-bold text-slate-800">핑구네 가계부 분석</h1>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
    <!-- Step 1: Upload UI -->
    <div id="upload-section" class="card p-6">
      <div id="upload-ui">
          <div class="flex items-center gap-3">
            <div class="flex-shrink-0 h-10 w-10 rounded-full bg-sky-500 text-white grid place-items-center font-bold text-lg">1</div>
            <div>
              <h2 class="text-lg font-bold">뱅샐현황 엑셀 파일 업로드</h2>
              <p class="text-sm text-slate-500">분석할 엑셀 파일을 최대 2개까지 선택하세요.</p>
            </div>
          </div>

          <div class="mt-6 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="file-input-wrapper" id="dropzone1">
              <svg class="mx-auto h-12 w-12 text-slate-300" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true"><path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" /></svg>
              <input id="file1" type="file" accept=".xlsx, .csv" class="mt-4 file-input" />
            </div>
            <div class="file-input-wrapper" id="dropzone2">
              <svg class="mx-auto h-12 w-12 text-slate-300" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true"><path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" /></svg>
              <input id="file2" type="file" accept=".xlsx, .csv" class="mt-4 file-input" />
            </div>
          </div>
          
          <div class="mt-6 flex justify-end items-center gap-4">
            <span id="status" class="text-sm text-slate-500"></span>
            <button id="runBtn" class="btn btn-primary">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-8.707l-3-3a1 1 0 00-1.414 1.414L10.586 9H7a1 1 0 100 2h3.586l-1.293 1.293a1 1 0 101.414 1.414l3-3a1 1 0 000-1.414z" clip-rule="evenodd" /></svg>
              분석 시작
            </button>
          </div>
      </div>

      <div id="shared-loading-ui" class="hidden text-center py-10">
          <svg class="animate-spin h-10 w-10 text-sky-500 mx-auto mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          <h2 class="text-lg font-bold text-slate-700">공유받은 데이터를 불러오는 중입니다...</h2>
          <p class="text-sm text-slate-500 mt-2">잠시만 기다려주세요.</p>
      </div>
    </div>

    <!-- Step 2: Results -->
    <div id="results-section" class="mt-8 hidden">
       <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
        <div class="flex items-center gap-3">
            <div class="flex-shrink-0 h-10 w-10 rounded-full bg-sky-500 text-white grid place-items-center text-2xl">🐧</div>
            <div>
                <h2 class="text-lg font-bold">분석 결과 대시보드</h2>
                <p class="text-sm text-slate-500">생성된 재무 분석 결과입니다.</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button id="exportBtn" class="btn btn-primary bg-emerald-600 hover:bg-emerald-700 text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" /></svg>
                🚀 클라우드 동기화 (공유 링크 갱신)
            </button>
            <button id="resetBtn" class="btn btn-secondary">처음으로</button>
        </div>
      </div>

      <h3 class="text-base font-semibold text-slate-600 mt-6">재무 현황 요약</h3>
      <div id="summary" class="mt-2 grid grid-cols-1 md:grid-cols-3 gap-4"></div>

      <h3 class="text-base font-semibold text-slate-600 mt-6">현금흐름 요약 (최근 12개월)</h3>
      <div id="cashflow-summary" class="mt-2 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div>

      <div id="charts" class="mt-6 grid grid-cols-1 lg:grid-cols-3 gap-6"></div>
      
      <div class="card mt-6">
        <div class="border-b border-slate-200">
            <nav id="tab-buttons" class="flex gap-2 p-2">
                <button class="tab-btn active" data-tab="details">자산/부채 상세</button>
                <button class="tab-btn" data-tab="cashflow">현금흐름 분석</button>
                <button class="tab-btn" data-tab="logs">진단 로그</button>
            </nav>
        </div>
        <div class="p-6">
            <div id="tab-details" class="tab-content active">
                <div id="result"></div>
            </div>
            <div id="tab-cashflow" class="tab-content">
                <div id="cashflow"></div>
            </div>
            <div id="tab-logs" class="tab-content">
                 <div id="tests" class="text-xs whitespace-pre-wrap p-3 rounded-lg border bg-slate-50 h-64 overflow-auto"></div>
            </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Transaction Modal -->
  <div id="transaction-modal" class="modal-overlay hidden">
      <div class="modal-content">
          <div class="p-4 border-b border-slate-200 flex justify-between items-center">
              <h3 id="modal-title" class="text-lg font-semibold"></h3>
              <button id="close-modal-btn" class="text-slate-400 hover:text-slate-600">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
              </button>
          </div>
          <div id="modal-body" class="p-4 overflow-y-auto"></div>
      </div>
  </div>

  <!-- Message Modal -->
  <div id="message-modal" class="modal-overlay hidden">
      <div class="modal-content !max-w-md">
          <div class="p-4 border-b border-slate-200 flex justify-between items-center">
              <h3 id="msg-title" class="text-lg font-semibold text-emerald-700">안내</h3>
              <button id="close-msg-btn" class="text-slate-400 hover:text-slate-600">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
              </button>
          </div>
          <div id="msg-body" class="p-6 text-slate-700"></div>
          <div class="p-4 border-t border-slate-200 text-right bg-slate-50 rounded-b-lg">
              <button id="msg-ok-btn" class="btn btn-primary">확인</button>
          </div>
      </div>
  </div>

  <script>
    // ===== Custom Alert Modal =====
    function showMessage(title, htmlContent) {
        document.getElementById('msg-title').textContent = title;
        document.getElementById('msg-body').innerHTML = htmlContent;
        document.getElementById('message-modal').classList.remove('hidden');
    }
    document.getElementById('close-msg-btn').addEventListener('click', () => document.getElementById('message-modal').classList.add('hidden'));
    document.getElementById('msg-ok-btn').addEventListener('click', () => document.getElementById('message-modal').classList.add('hidden'));

    // ===== UI Setup =====
    function setupUI() {
        var dropzones = ['dropzone1', 'dropzone2'];
        for (var i = 0; i < dropzones.length; i++) {
            (function(index) {
                const dropzone = document.getElementById(dropzones[index]);
                const fileInput = document.getElementById('file' + (index + 1));
                if(!dropzone || !fileInput) return;
                dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
                dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
                dropzone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    dropzone.classList.remove('dragover');
                    if (e.dataTransfer.files.length) {
                        fileInput.files = e.dataTransfer.files;
                        fileInput.dispatchEvent(new Event('change', { bubbles: true }));
                    }
                });
            })(i);
        }

        const tabButtons = document.getElementById('tab-buttons');
        const tabContents = document.querySelectorAll('.tab-content');
        if(tabButtons) {
            tabButtons.addEventListener('click', (e) => {
                let target = e.target;
                while (target && target !== document && (!target.classList || !target.classList.contains('tab-btn'))) {
                    target = target.parentNode;
                }
                if (!target || target === document) return;

                const btns = tabButtons.querySelectorAll('.tab-btn');
                for (let j = 0; j < btns.length; j++) {
                    btns[j].classList.remove('active');
                }
                target.classList.add('active');
                
                for (let j = 0; j < tabContents.length; j++) {
                    tabContents[j].classList.remove('active');
                }
                
                const contentId = 'tab-' + target.getAttribute('data-tab');
                const contentEl = document.getElementById(contentId);
                if (contentEl) contentEl.classList.add('active');
            });
        }
        
        const txModal = document.getElementById('transaction-modal');
        const closeTxModalBtn = document.getElementById('close-modal-btn');
        if(closeTxModalBtn && txModal) {
            closeTxModalBtn.addEventListener('click', () => txModal.classList.add('hidden'));
            txModal.addEventListener('click', (e) => { if (e.target === txModal) txModal.classList.add('hidden'); });
        }
    }

    // ===== Debug logger =====
    function __log(...args) {
      try { const el = document.getElementById('tests'); if (!el) return; const line = args.map(v => { try { return typeof v === 'string' ? v : JSON.stringify(v); } catch { return String(v); } }).join(' '); el.textContent += (el.textContent ? '\n' : '') + `[${new Date().toLocaleTimeString()}] ${line}`; el.scrollTop = el.scrollHeight; } catch (_) { /* noop */ }
    }
    
    // ===== 🔥 GitHub Gist 연동 설정 🔥 =====
    // 발급받은 Personal Access Token을 아래 따옴표 안에 넣으세요.
    const GITHUB_TOKEN = "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"; 
    let GIST_ID = localStorage.getItem('pingu_gist_id') || "";

    function setStatus(loading, text=''){
      const s = document.getElementById('status'); if (!s) return;
      if (loading){ s.innerHTML = `<svg class="animate-spin h-5 w-5 text-sky-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg><span class="ml-2">${text}</span>`; } else { s.innerHTML = text ? `<span>${text}</span>` : ''; }
    }

    const MIN_AMOUNT = 1000;
    const formatKRW = (v) => new Intl.NumberFormat('ko-KR').format(v);
    const fmtWon = (n) => `${formatKRW(Math.round(typeof n === 'number' ? n : Number(n)))}원`;
    const parseNumber = (v) => { if (typeof v === 'number') return v; if (v == null || v === '') return null; const num = Number(String(v).replace(/[^\d.-]/g, '')); return Number.isFinite(num) && !Number.isNaN(num) ? num : null; };
    async function readFileAsArrayBuffer(file) { if (file && file.arrayBuffer) return await file.arrayBuffer(); return new Promise((resolve, reject) => { const fr = new FileReader(); fr.onload = (e) => resolve(e.target.result); fr.onerror = reject; fr.readAsArrayBuffer(file); }); }

    function findSectionRange(rows) {
      let startIdx = -1; let headerIdx = -1; let end = rows.length; const normLine = (row) => (row || []).join('').replace(/\s/g, ''); const countEq = (row, s) => row.reduce((c, v) => c + (String(v).trim() === s ? 1 : 0), 0);
      for (let i = 0; i < rows.length; i++) { const row = rows[i] || []; const line = normLine(row); if (startIdx === -1) { if (line.includes('3.재무현황') || (line.includes('자산') && line.includes('부채'))) startIdx = i; } if (startIdx !== -1) { const hn = countEq(row, '항목'); const pn = countEq(row, '상품명'); const mn = countEq(row, '금액'); if (hn >= 2 && pn >= 2 && mn >= 2) headerIdx = i; if (line.includes('총자산') || line.includes('순자산') || line.includes('4.보험현황')) { end = i; break; } } }
      if (startIdx === -1) startIdx = 0;
      if (headerIdx !== -1) return { start: headerIdx + 1, end, headerRowIndex: headerIdx };
      return { start: startIdx + 1, end, headerRowIndex: -1 };
    }
    function findHeaderCols(row) { const cells = row.map((c) => String(c).trim()); const idxs = (label) => cells.map((c, i) => (c === label ? i : -1)).filter((i) => i !== -1); const hIdx = idxs('항목'); const pIdx = idxs('상품명'); const mIdx = idxs('금액'); if (hIdx.length >= 2 && pIdx.length >= 2 && mIdx.length >= 2) { return { aCat: hIdx[0], aProd: pIdx[0], aAmt: mIdx[0], lCat: hIdx[hIdx.length - 1], lProd: pIdx[pIdx.length - 1], lAmt: mIdx[mIdx.length - 1] }; } return null; }

    function parseFinancialStatus(rows) {
      const assets = []; const liabilities = [];
      const range = findSectionRange(rows);
      const headerRow = range.headerRowIndex !== -1 ? rows[range.headerRowIndex] : (rows[range.start - 1] || []);
      const cols = findHeaderCols(headerRow) || { aCat: 0, aProd: 1, aAmt: 3, lCat: 4, lProd: 5, lAmt: 7 };
      let curAssetCategory = ''; let curLiabCategory = '';
      for (let i = range.start; i < range.end; i++) {
        const r = rows[i] || [];
        const aCatCell = r[cols.aCat] != null ? String(r[cols.aCat]).trim() : '';
        const aProdCell = r[cols.aProd] != null ? String(r[cols.aProd]).trim() : '';
        const aAmt = parseNumber(r[cols.aAmt]);
        if (aCatCell && !['자산', '부채', '항목'].includes(aCatCell)) curAssetCategory = aCatCell;
        if (aProdCell && aAmt != null && aAmt >= MIN_AMOUNT) assets.push({ 항목명: curAssetCategory || '기타', 상품명: aProdCell, 금액: aAmt });
        const lCatCell = r[cols.lCat] != null ? String(r[cols.lCat]).trim() : '';
        const lProdCell = r[cols.lProd] != null ? String(r[cols.lProd]).trim() : '';
        const lAmt = parseNumber(r[cols.lAmt]);
        if (lCatCell && !['자산', '부채', '항목'].includes(lCatCell)) curLiabCategory = lCatCell;
        if (lProdCell && lAmt != null && lAmt >= MIN_AMOUNT) liabilities.push({ 항목명: curLiabCategory || '기타', 상품명: lProdCell, 금액: lAmt });
      }
      return { assets, liabilities };
    }

    function pickBangsaelSheet(workbook, sheetName) {
        if (!workbook || !workbook.SheetNames) return null;
        if (workbook.Sheets[sheetName]) return workbook.Sheets[sheetName];
        const foundName = (workbook.SheetNames || []).find((n) => n.replace(/\s/g, '').includes(sheetName.replace(/\s/g, '')));
        return foundName ? workbook.Sheets[foundName] : (workbook.SheetNames.length === 1 ? workbook.Sheets[workbook.SheetNames[0]] : null);
    }

    function groupByCategory(items) { const map = new Map(); for (const it of items) { const key = it.항목명 || '기타'; if (!map.has(key)) map.set(key, []); map.get(key).push(it); } return map; }

    function renderGroupedTable(title, items) {
        const groups = groupByCategory(items);
        let html = `<h3 class="text-lg font-semibold mb-4">${title}</h3>`;
        if (items.length === 0) { return html + `<div class="text-slate-500 p-4 border rounded-lg bg-slate-50">데이터 없음</div>`; }
        html += `<div class="space-y-4">`;
        for (const [cat, rows] of groups.entries()) {
            const subtotal = rows.reduce((s, r) => s + (r.금액 || 0), 0);
            html += `
            <div class="border border-slate-200 rounded-lg overflow-hidden">
                <div class="px-4 py-2 bg-slate-50 font-semibold flex justify-between items-center">
                    <span>${cat}</span>

    function findCashflowRange(rows){
      let start = -1; const normLine = (row) => (row||[]).join('').replace(/\s/g,'');
      for(let i=0; i < rows.length; i++){
        const line = normLine(rows[i]);
        if(start === -1 && line.includes('현금흐름현황')) start = i;
        else if(start !== -1 && (line.includes('3.재무현황') || line.includes('재무현황'))) return { start: start + 1, end: i };
      }
      return start !== -1 ? { start: start+1, end: rows.length } : null;
    }

    function parseCashflowMatrix(rows, s, e) {
        let monthsInfo = null;
        for (let i = s; i < Math.min(e, s + 40); i++) {
            const row = rows[i] || [];
            let months = [];
            for (let j = 0; j < row.length; j++) {
                const ym = parseMonthLike(row[j]);
                if (ym) months.push({ col: j, month: ym });
            }
            if (months.length >= 2) { monthsInfo = { headerRowIndex: i, monthMap: months }; break; }
        }
        if (!monthsInfo) return null;
        const monthColMap = new Map(monthsInfo.monthMap.map(m => [m.month, m.col]));
        let incomeTR, expenseTR, iCEIdx = -1, eCSIdx = -1, eCEIdx = -1;
        for (let i = monthsInfo.headerRowIndex + 1; i < e; i++) {
            const row = rows[i] || [];
            const nc = row.map(cell => cell != null ? cell : '').join('').replace(/\s/g, ''); 
            if (nc.includes('월수입총계')) { incomeTR = row; iCEIdx = i; eCSIdx = i + 1; }
            else if (nc.includes('월지출총계')) { expenseTR = row; eCEIdx = i; break; }
        }
        if (!incomeTR || !expenseTR) return null;
        const safePN = (v) => { const num = parseNumber(v); return num === null ? 0 : num; };
        const sumCR = (col, si, ei) => { let sum = 0; for (let r = si; r < ei; r++) if (rows[r]) sum += Math.abs(safePN(rows[r][col])); return sum; };
        const monthlyData = [];
        for (const [month, mCol] of monthColMap.entries()) {
            const iFT = safePN(incomeTR[mCol]), eFT = safePN(expenseTR[mCol]);
            const iFC = sumCR(mCol, monthsInfo.headerRowIndex + 1, iCEIdx), eFC = sumCR(mCol, eCSIdx, eCEIdx);
            monthlyData.push({ ym: month, income: Math.round(iFT || iFC), expense: Math.round(Math.abs(eFT) || eFC) });
        }
        const processCats = (si, ei) => {
            const catMap = new Map();
            for (let i = si; i < ei; i++) {
                const row = rows[i] || [];
                let label = ""; for(let j=0; j<row.length; j++) if(row[j] != null && String(row[j]).trim()) { label = String(row[j]).trim(); break; }
                if (!label || label.includes('총계')) continue;
                let total = 0; for (const [, col] of monthColMap.entries()) total += Math.abs(safePN(row[col]));
                if (total >= MIN_AMOUNT) catMap.set(label, (catMap.get(label) || 0) + Math.round(total));
            }
            return catMap;
        };
        return { monthly: monthlyData, incomeCategories: processCats(monthsInfo.headerRowIndex+1, iCEIdx), expenseCategories: processCats(eCSIdx, eCEIdx) };
    }

    function last12MonthsSorted(allMonths){
        const toNum=(ym)=>{ const [y,m]=ym.split('-'); return y*100+Number(m); };
        return Array.from(new Set(allMonths)).sort((a,b)=>toNum(b)-toNum(a)).slice(0,12).sort((a,b)=>toNum(a)-toNum(b));
    }
    
    function mergeCashflowResults(list){
      const monthlyMap = new Map(); const incomeCatMap = new Map(); const expenseCatMap = new Map();
      for(const r of list){ 
            if (!r) continue;
            for(const m of r.monthly||[]){ const cur = monthlyMap.get(m.ym)||{income:0, expense:0}; cur.income += m.income||0; cur.expense += m.expense||0; monthlyMap.set(m.ym, cur); } 
            for(const [k,v] of (r.incomeCategories||new Map()).entries()) incomeCatMap.set(k, (incomeCatMap.get(k)||0)+v);
            for(const [k,v] of (r.expenseCategories||new Map()).entries()) expenseCatMap.set(k, (expenseCatMap.get(k)||0)+v);
        }
      const window = last12MonthsSorted([...monthlyMap.keys()]);
      return { monthly: window.map(ym=>({ ym, income:monthlyMap.get(ym).income, expense:monthlyMap.get(ym).expense })), incomeCategories: incomeCatMap, expenseCategories: expenseCatMap };
    }
    
    function parseTransactions(rows) {
        let hIdx = rows.findIndex(row => row.includes('날짜') && row.includes('대분류') && row.includes('금액') && row.includes('타입'));
        if (hIdx === -1) return [];
        const h = rows[hIdx].map(h => String(h || '').trim());
        const dIdx = h.indexOf('날짜'), cIdx = h.indexOf('대분류'), coIdx = h.indexOf('내용'), aIdx = h.indexOf('금액'), tIdx = h.indexOf('타입');
        if ([dIdx, cIdx, aIdx, tIdx].includes(-1)) return [];
        const txs = [];
        for (let i = hIdx + 1; i < rows.length; i++) {
            const r = rows[i]; if (!Array.isArray(r) || r.length <= Math.max(dIdx, cIdx, aIdx, tIdx)) continue;
            const amt = parseNumber(r[aIdx]); if (amt == null) continue;
            let date = String(r[dIdx] || '');
            if (typeof r[dIdx] === 'number') { const d = XLSX.SSF.parse_date_code(r[dIdx]); if (d) date = `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`; }
            else if (r[dIdx] instanceof Date) date = r[dIdx].toISOString().split('T')[0];
            if (/^\d{4}-\d{2}-\d{2}$/.test(date)) txs.push({ date, category: String(r[cIdx]||'미분류').trim(), content: String(r[coIdx]||'').trim(), amount: amt, type: String(r[tIdx]||'').trim() });
        }
        return txs;
    }

    // ===== 🚀 Gist 동기화 로직 🚀 =====
    async function syncToGist() {
        if (!GITHUB_TOKEN) { showMessage("설정 필요", "GITHUB_TOKEN이 없습니다."); return; }
        try {
            const btn = document.getElementById('exportBtn');
            btn.innerHTML = `동기화 중...`; btn.disabled = true;
            const payload = { v: 2, data: { a: window.__data.assets, l: window.__data.liabilities, s: Array.from(window.__data.selectedAssetIds) }, cf: window.__cf ? { m: window.__cf.monthly, i: Array.from(window.__cf.incomeCategories), e: Array.from(window.__cf.expenseCategories) } : null, t: window.__transactions || [] };
            const method = GIST_ID ? 'PATCH' : 'POST';
            const url = GIST_ID ? `https://api.github.com/gists/${GIST_ID}` : 'https://api.github.com/gists';
            const res = await fetch(url, { method, headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ description: "핑구네 데이터", public: false, files: { "pingu_data.json": { content: JSON.stringify(payload) } } }) });
            if (!res.ok) throw new Error("Gist API 실패");
            const data = await res.json();
            if (!GIST_ID) { GIST_ID = data.id; localStorage.setItem('pingu_gist_id', GIST_ID); }
            const shareUrl = new URL(window.location.href); shareUrl.searchParams.set('gist', GIST_ID);
            showMessage("동기화 완료", `<p>아래 링크를 카톡 공지에 올리세요!</p><input id="sur" type="text" value="${shareUrl.toString()}" class="w-full border p-2 mt-2 font-mono text-xs" readonly><button onclick="document.getElementById('sur').select();document.execCommand('copy');this.innerText='복사됨'" class="btn btn-primary mt-2">복사하기</button>`);
        } catch (e) { showMessage("오류", e.message); } finally { document.getElementById('exportBtn').innerHTML = `🚀 클라우드 동기화`; document.getElementById('exportBtn').disabled = false; }
    }

    async function loadFromGist(id) {
        try {
            document.getElementById('upload-ui').classList.add('hidden');
            document.getElementById('shared-loading-ui').classList.remove('hidden');
            const res = await fetch(`https://api.github.com/gists/${id}`);
            if (!res.ok) throw new Error("로드 실패");
            const data = await res.json();
            const payload = JSON.parse(data.files['pingu_data.json'].content);
            window.__isSharedUrlData = true;
            window.__data = { assets: payload.data.a, liabilities: payload.data.l, selectedAssetIds: new Set(payload.data.s) };
            if (payload.cf) window.__cf = { monthly: payload.cf.m, incomeCategories: new Map(payload.cf.i), expenseCategories: new Map(payload.cf.e) };
            window.__transactions = payload.t;
            document.getElementById('upload-section').classList.add('hidden');
            document.getElementById('results-section').classList.remove('hidden');
            const eBtn = document.getElementById('exportBtn'); if(eBtn) eBtn.style.display = 'none';
            renderAll();
        } catch (e) { alert("오류: " + e.message); window.location.href = window.location.pathname; }
    }

    async function run(){
      try{
        setStatus(true,'파일 읽는 중...');
        const runButton = document.getElementById('runBtn'); runButton.disabled = true;
        const files = [document.getElementById('file1').files[0], document.getElementById('file2').files[0]].filter(Boolean);
        if(!files.length){ setStatus(false,'파일 선택!'); runButton.disabled = false; return; }
        const parsedFS = [], parsedCF = [], allT = [];
        for(let f of files){
          const buf = await readFileAsArrayBuffer(f);
          const wb = XLSX.read(buf, { type: 'array', cellDates:true });
          const sFS = pickBangsaelSheet(wb, '뱅샐현황');
          if(sFS){ parsedFS.push(parseFinancialStatus(XLSX.utils.sheet_to_json(sFS, { header:1, raw: true }))); parsedCF.push(parseCashflow(XLSX.utils.sheet_to_json(sFS, { header:1 }))); }
          const sTX = pickBangsaelSheet(wb, '가계부 내역');
          if (sTX) allT.push(...parseTransactions(XLSX.utils.sheet_to_json(sTX, { header: 1 })));
        }
        let a = [], l = [];
        for (let r of parsedFS) { if (r.assets) a = a.concat(r.assets); if (r.liabilities) l = l.concat(r.liabilities); }
        for (let i = 0; i < a.length; i++) a[i].id = 'A' + i;
        window.__data = { assets: a, liabilities: l, selectedAssetIds: new Set(a.map(it=>it.id)) };
        window.__cf = mergeCashflowResults(parsedCF);
        window.__transactions = allT;
        document.getElementById('upload-section').classList.add('hidden');
        document.getElementById('results-section').classList.remove('hidden');
        window.__isSharedUrlData = false;
        renderAll();
        setStatus(false,'완료');
      } catch(err){ setStatus(false,'오류'); __log(err); } finally { document.getElementById('runBtn').disabled = false; }
    }
    
    function initApp() {
        setupUI();
        const urlParams = new URLSearchParams(window.location.search);
        const gistId = urlParams.get('gist');
        if (gistId) loadFromGist(gistId);
        else document.getElementById('upload-section').classList.remove('hidden');

        const rBtn = document.getElementById('runBtn'); if(rBtn) rBtn.addEventListener('click', run);
        
        // 에러 해결: 중복 선언 제거 및 변수명 관리
        const syncBtn = document.getElementById('exportBtn');
        if(syncBtn) syncBtn.addEventListener('click', syncToGist);
        
        const resetBtn = document.getElementById('resetBtn'); if(resetBtn) resetBtn.addEventListener('click', () => { window.location.href = window.location.pathname; });
        
        const cfEl = document.getElementById('cashflow');
        if(cfEl) {
             cfEl.addEventListener('click', (e) => {
                let row = e.target;
                while (row && row !== document && (!row.classList || !row.classList.contains('category-row'))) row = row.parentNode;
                if (row && row !== document) { const c = row.getAttribute('data-category'), t = row.getAttribute('data-type'); if (c && t) showTransactionModal(c, t); }
            });
             cfEl.addEventListener('change', (e) => { if (e.target.id === 'month-selector') renderCategoryTables(e.target.value); });
        }

        // 체크박스 동작 해결: 어떤 모드에서든 작동하도록 initApp에 배치
        document.body.addEventListener('change', (e) => {
            if (e.target.classList.contains('asset-select')) {
                const id = e.target.getAttribute('data-id');
                if (window.__data && window.__data.selectedAssetIds) {
                    if (e.target.checked) window.__data.selectedAssetIds.add(id);
                    else window.__data.selectedAssetIds.delete(id);
                    const sel = window.__data.assets.filter(it=> window.__data.selectedAssetIds.has(it.id));
                    renderSummary(sel, window.__data.liabilities, true);
                    renderCharts(sel, window.__data.liabilities);
                }
            }
        });
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initApp);
    else initApp();
  </script>
</body>
</html>
