<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐧 핑구네 가계부 분석</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- 파이 차트 퍼센트 표시 플러그인 -->
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lz-string@1.4.4/libs/lz-string.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --primary-color: #0ea5e9;
      --primary-hover: #0284c7;
      --background-color: #f1f5f9;
      --card-background-color: #ffffff;
      --text-color: #1e293b;
      --muted-text-color: #64748b;
      --border-color: #e2e8f0;
      --border-radius: 0.75rem;
    }
    body { 
      background-color: var(--background-color); 
      color: var(--text-color); 
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background-color: var(--card-background-color);
      border-radius: var(--border-radius);
      border: 1px solid var(--border-color);
      box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.625rem 1rem;
      border-radius: 0.5rem;
      font-weight: 600;
      transition: all 0.2s ease;
      cursor: pointer;
      border: 1px solid transparent;
    }
    .btn-primary { background-color: #0ea5e9; color: white; }
    .btn-primary:hover { background-color: #0284c7; }
    .btn-secondary { background-color: #f8fafc; color: #334155; border-color: #e2e8f0; }
    .btn-secondary:hover { background-color: #f1f5f9; }
    .btn:disabled { background-color: #94a3b8; cursor: not-allowed; opacity: 0.7; }
    .file-input-wrapper {
        border: 2px dashed var(--border-color);
        border-radius: var(--border-radius);
        padding: 2rem 1rem;
        text-align: center;
        transition: border-color 0.2s ease;
    }
    .file-input-wrapper.dragover { border-color: var(--primary-color); }
    .file-input { width: 100%; background-color: #f8fafc; border-radius: 0.5rem; font-size: 0.875rem; }
    .tab-btn {
        padding: 0.5rem 1rem;
        font-weight: 600;
        border-radius: 0.5rem;
        cursor: pointer;
        color: var(--muted-text-color);
        border-bottom: 2px solid transparent;
    }
    .tab-btn.active { color: var(--primary-color); border-bottom-color: var(--primary-color); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .modal-overlay {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background-color: rgba(0, 0, 0, 0.5);
        display: flex; align-items: center; justify-content: center; z-index: 50;
    }
    .modal-content {
        background-color: white; border-radius: var(--border-radius);
        width: 90%; max-width: 800px; max-height: 90vh;
        display: flex; flex-direction: column;
    }
    .hidden { display: none; }
  </style>
</head>
<body class="min-h-screen">
  <header class="bg-white shadow-sm sticky top-0 z-20">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="text-2xl">🐧</div>
        <h1 class="text-xl font-bold text-slate-800">핑구네 가계부 분석</h1>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto p-4 sm:p-8">
    <div id="upload-section" class="card p-6">
      <div id="upload-ui">
          <div class="flex items-center gap-3 mb-6">
            <div class="h-10 w-10 rounded-full bg-sky-500 text-white grid place-items-center font-bold">1</div>
            <h2 class="text-lg font-bold">뱅샐현황 엑셀 파일 업로드</h2>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="file-input-wrapper" id="dropzone1">
              <input id="file1" type="file" accept=".xlsx, .csv" class="mt-4 file-input" />
            </div>
            <div class="file-input-wrapper" id="dropzone2">
              <input id="file2" type="file" accept=".xlsx, .csv" class="mt-4 file-input" />
            </div>
          </div>
          <div class="mt-6 flex justify-end items-center gap-4">
            <span id="status" class="text-sm text-slate-500"></span>
            <button id="runBtn" class="btn btn-primary">분석 시작</button>
          </div>
      </div>
      <div id="shared-loading-ui" class="hidden text-center py-10">
          <svg class="animate-spin h-10 w-10 text-sky-500 mx-auto mb-4" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          <h2 class="text-lg font-bold text-slate-700">데이터를 불러오는 중입니다...</h2>
      </div>
    </div>

    <div id="results-section" class="mt-8 hidden">
       <div class="flex flex-col sm:flex-row items-center justify-between gap-4 mb-6">
        <h2 class="text-lg font-bold">분석 결과 대시보드</h2>
        <div class="flex gap-2">
            <button id="exportBtn" class="btn btn-primary bg-emerald-600 hover:bg-emerald-700">🚀 클라우드 동기화</button>
            <button id="resetBtn" class="btn btn-secondary">처음으로</button>
        </div>
      </div>
      <div id="summary" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6"></div>
      <div id="cashflow-summary" class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6"></div>
      <div id="charts" class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6"></div>
      
      <div class="card mt-6">
        <div class="border-b border-slate-200 p-2 flex gap-2" id="tab-buttons">
            <button class="tab-btn active" data-tab="details">자산/부채 상세</button>
            <button class="tab-btn" data-tab="cashflow">현금흐름 분석</button>
            <button class="tab-btn" data-tab="logs">진단 로그</button>
        </div>
        <div class="p-6">
            <div id="tab-details" class="tab-content active">
                <div class="flex justify-end mb-4">
                    <!-- 🔥 onchange 이벤트를 직접 요소에 바인딩하여 100% 작동 보장 -->
                    <select id="file-selector" onchange="renderAssetUpdatesOnly()" class="hidden border border-slate-300 rounded px-3 py-1 font-semibold text-slate-700 bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-sky-500">
                        <option value="all">전체 합산</option>
                    </select>
                </div>
                <div id="result-tables"></div>
            </div>
            <div id="tab-cashflow" class="tab-content"><div id="cashflow"></div></div>
            <div id="tab-logs" class="tab-content"><pre id="tests" class="text-xs bg-slate-50 p-3 rounded h-64 overflow-auto"></pre></div>
        </div>
      </div>
    </div>
  </main>

  <div id="transaction-modal" class="modal-overlay hidden">
      <div class="modal-content">
          <div class="p-4 border-b flex justify-between items-center bg-slate-50 rounded-t-xl">
              <h3 id="modal-title" class="font-bold text-slate-800 text-lg"></h3>
              <button id="close-modal-btn" class="text-slate-400 hover:text-slate-600 text-2xl font-bold px-2">✕</button>
          </div>
          <div id="modal-body" class="p-4 overflow-y-auto"></div>
      </div>
  </div>

  <div id="message-modal" class="modal-overlay hidden">
      <div class="modal-content !max-w-md p-6 text-center">
          <h3 id="msg-title" class="text-lg font-bold mb-4"></h3>
          <div id="msg-body" class="mb-6 text-slate-600"></div>
          <button id="msg-ok-btn" class="btn btn-primary w-full">확인</button>
      </div>
  </div>

  <script>
    // ===== 🔥 중요: GitHub Gist 연동 설정 🔥 =====
    const GITHUB_TOKEN = ""; // 👈 여기에 발급받은 ghp_... 토큰을 다시 입력해주세요.
    let GIST_ID = localStorage.getItem('pingu_gist_id') || "";

    if (window.Chart && window.ChartDataLabels) Chart.register(ChartDataLabels);
    const EXCLUDED_KEYWORDS = ['이체', '내계좌이체', '카드대금', '저축'];

    // ===== UI Setup Functions =====
    function setupUI() {
        var dropzones = ['dropzone1', 'dropzone2'];
        for (var i = 0; i < dropzones.length; i++) {
            (function(index) {
                const dropzone = document.getElementById(dropzones[index]);
                const fileInput = document.getElementById('file' + (index + 1));
                if(!dropzone || !fileInput) return;
                dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
                dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
                dropzone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    dropzone.classList.remove('dragover');
                    if (e.dataTransfer.files.length) {
                        fileInput.files = e.dataTransfer.files;
                        fileInput.dispatchEvent(new Event('change', { bubbles: true }));
                    }
                });
            })(i);
        }

        const tabButtons = document.getElementById('tab-buttons');
        const tabContents = document.querySelectorAll('.tab-content');
        if(tabButtons) {
            tabButtons.addEventListener('click', (e) => {
                let target = e.target;
                while (target && target !== document && (!target.classList || !target.classList.contains('tab-btn'))) {
                    target = target.parentNode;
                }
                if (!target || target === document) return;

                tabButtons.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                target.classList.add('active');
                
                tabContents.forEach(content => content.classList.remove('active'));
                const contentEl = document.getElementById('tab-' + target.getAttribute('data-tab'));
                if (contentEl) contentEl.classList.add('active');
            });
        }
        
        const closeTxModalBtn = document.getElementById('close-modal-btn');
        const txModal = document.getElementById('transaction-modal');
        if(closeTxModalBtn && txModal) {
            closeTxModalBtn.onclick = () => txModal.classList.add('hidden');
            txModal.onclick = (e) => { if(e.target === txModal) txModal.classList.add('hidden'); };
        }
    }

    // ===== Utilities =====
    const MIN_AMOUNT = 1000;
    const formatKRW = (v) => new Intl.NumberFormat('ko-KR').format(v);
    const fmtWon = (n) => `${formatKRW(Math.round(n || 0))}원`;
    const parseNumber = (v) => { if (typeof v === 'number') return v; if (!v) return null; const num = Number(String(v).replace(/[^\d.-]/g, '')); return isFinite(num) ? num : null; };
    
    function __log(...args) {
      try { const el = document.getElementById('tests'); if (!el) return; const line = args.map(v => typeof v === 'string' ? v : JSON.stringify(v)).join(' '); el.textContent += (el.textContent ? '\n' : '') + `[${new Date().toLocaleTimeString()}] ${line}`; el.scrollTop = el.scrollHeight; } catch (_) { }
    }

    function setStatus(loading, text=''){
      const s = document.getElementById('status'); if (!s) return;
      if (loading){ s.innerHTML = `<span>${text}</span>`; } else { s.innerHTML = text ? `<span>${text}</span>` : ''; }
    }

    function parseMonthLike(val) {
        if (!val) return null;
        if (val instanceof Date) return `${val.getFullYear()}-${String(val.getMonth() + 1).padStart(2, '0')}`;
        if (typeof val === 'number' && val > 30000) {
            const d = XLSX.SSF.parse_date_code(val);
            if (d) return `${d.y}-${String(d.m).padStart(2, '0')}`;
        }
        const s = String(val).trim();
        let m = s.match(/(20\d{2})[.\/\s-]+(\d{1,2})/) || s.match(/(20\d{2})\s*년\s*(\d{1,2})\s*월/);
        return m ? `${m[1]}-${String(m[2]).padStart(2, '0')}` : null;
    }

    async function readFileAsArrayBuffer(file) {
        return new Promise((res, rej) => {
            const fr = new FileReader();
            fr.onload = (e) => res(e.target.result);
            fr.onerror = rej;
            fr.readAsArrayBuffer(file);
        });
    }

    function showMessage(title, body) {
        document.getElementById('msg-title').textContent = title;
        document.getElementById('msg-body').innerHTML = body;
        document.getElementById('message-modal').classList.remove('hidden');
    }
    document.getElementById('msg-ok-btn').onclick = () => document.getElementById('message-modal').classList.add('hidden');

    // ===== Data Analysis Logic =====
    let charts = { pie: null, barAsset: null, cfMonthly: null, cfCat: null };
    function destroyCharts() { for (let k in charts) if (charts[k]) { charts[k].destroy(); charts[k] = null; } }

    function findSectionRange(rows) {
        let start = -1, header = -1, end = rows.length;
        for (let i = 0; i < rows.length; i++) {
            const line = (rows[i] || []).join('').replace(/\s/g, '');
            if (start === -1 && (line.includes('3.재무현황') || (line.includes('자산') && line.includes('부채')))) start = i;
            if (start !== -1 && header === -1) {
                const hn = rows[i].filter(v => String(v).trim() === '항목').length;
                if (hn >= 2) header = i;
            }
            if (start !== -1 && (line.includes('총자산') || line.includes('순자산') || line.includes('4.보험'))) { end = i; break; }
        }
        return { start: (header !== -1 ? header + 1 : start + 1), end };
    }

    function parseFinancialStatus(rows, fileName) {
        const assets = [], liabilities = [];
        const range = findSectionRange(rows);
        let curACat = '', curLCat = '';
        for (let i = range.start; i < range.end; i++) {
            const r = rows[i] || [];
            const aCat = String(r[0] || '').trim(), aProd = String(r[1] || '').trim(), aAmt = parseNumber(r[3]);
            if (aCat && !['자산', '부채', '항목'].includes(aCat)) curACat = aCat;
            if (aProd && aAmt >= MIN_AMOUNT) assets.push({ 항목명: curACat || '기타', 상품명: aProd, 금액: aAmt, fileName: fileName });
            
            const lCat = String(r[4] || '').trim(), lProd = String(r[5] || '').trim(), lAmt = parseNumber(r[7]);
            if (lCat && !['자산', '부채', '항목'].includes(lCat)) curLCat = lCat;
            if (lProd && lAmt >= MIN_AMOUNT) liabilities.push({ 항목명: curLCat || '기타', 상품명: lProd, 금액: lAmt, fileName: fileName });
        }
        return { assets, liabilities };
    }

    function pickBangsaelSheet(workbook, sheetName) {
        if (!workbook || !workbook.SheetNames) return null;
        if (workbook.Sheets[sheetName]) return workbook.Sheets[sheetName];
        const foundName = workbook.SheetNames.find((n) => n.replace(/\s/g, '').includes(sheetName.replace(/\s/g, '')));
        return foundName ? workbook.Sheets[foundName] : (workbook.SheetNames.length === 1 ? workbook.Sheets[workbook.SheetNames[0]] : null);
    }

    function parseCashflowMatrix(rows, s, e) {
        let monthsInfo = null;
        for (let i = s; i < Math.min(e, s + 40); i++) {
            let months = [];
            (rows[i] || []).forEach((v, j) => { const ym = parseMonthLike(v); if (ym) months.push({ col: j, month: ym }); });
            if (months.length >= 2) { monthsInfo = { headerIdx: i, map: months }; break; }
        }
        if (!monthsInfo) return null;
        const monthCols = new Map(monthsInfo.map.map(m => [m.month, m.col]));
        let incomeR, expenseR, iCE = -1, eCS = -1, eCE = -1;
        for (let i = monthsInfo.headerIdx + 1; i < e; i++) {
            const line = (rows[i] || []).join('').replace(/\s/g, '');
            if (line.includes('월수입총계')) { incomeR = rows[i]; iCE = i; eCS = i + 1; }
            else if (line.includes('월지출총계')) { expenseR = rows[i]; eCE = i; break; }
        }
        if (!incomeR || !expenseR) return null;
        const sumR = (col, si, ei) => { let s = 0; for (let r = si; r < ei; r++) if (rows[r]) s += Math.abs(parseNumber(rows[r][col]) || 0); return s; };
        const monthly = [];
        for (const [m, c] of monthCols.entries()) {
            const iAmt = parseNumber(incomeR[c]) || sumR(c, monthsInfo.headerIdx + 1, iCE);
            const eAmt = Math.abs(parseNumber(expenseR[c])) || sumR(c, eCS, eCE);
            monthly.push({ ym: m, income: Math.abs(iAmt), expense: Math.abs(eAmt) });
        }
        
        const processCats = (si, ei) => {
            const map = new Map();
            for (let i = si; i < ei; i++) {
                let label = ""; if (rows[i]) for(let cell of rows[i]) if(cell != null && String(cell).trim()){ label = String(cell).trim(); break; }
                if (!label || label.includes('총계')) continue;
                if (label.includes('숨김') || EXCLUDED_KEYWORDS.some(k => label.includes(k))) continue;
                let tot = 0; for (const [, c] of monthCols.entries()) tot += Math.abs(parseNumber(rows[i][c]) || 0);
                if (tot >= MIN_AMOUNT) map.set(label, (map.get(label) || 0) + Math.round(tot));
            }
            return map;
        };
        return { monthly, incomeCategories: processCats(monthsInfo.headerIdx + 1, iCE), expenseCategories: processCats(eCS, eCE) };
    }

    function computeCategoryTotals(items, topN = 10) {
        const totals = new Map();
        for (const it of items) {
            const key = it.항목명 || '기타';
            totals.set(key, (totals.get(key) || 0) + (it.금액 || 0));
        }
        const sorted = [...totals.entries()].sort((a, b) => b[1] - a[1]);
        return sorted.length > topN ? sorted.slice(0, topN) : sorted;
    }

    function last12MonthsSorted(allMonths){
        const toNum=(ym)=>{ const [y,m]=ym.split('-'); return y*100+Number(m); };
        return Array.from(new Set(allMonths)).sort((a,b)=>toNum(b)-toNum(a)).slice(0,12).sort((a,b)=>toNum(a)-toNum(b));
    }
    
    function mergeCashflowResults(list){
      const monthlyMap = new Map(); const incomeCatMap = new Map(); const expenseCatMap = new Map();
      for(const r of list){ 
            if (!r) continue;
            for(const m of r.monthly||[]){ const cur = monthlyMap.get(m.ym)||{income:0, expense:0}; cur.income += m.income||0; cur.expense += m.expense||0; monthlyMap.set(m.ym, cur); } 
            for(const [k,v] of (r.incomeCategories||new Map()).entries()) incomeCatMap.set(k, (incomeCatMap.get(k)||0)+v);
            for(const [k,v] of (r.expenseCategories||new Map()).entries()) expenseCatMap.set(k, (expenseCatMap.get(k)||0)+v);
        }
      const window = last12MonthsSorted([...monthlyMap.keys()]);
      return { monthly: window.map(ym=>({ ym, income:monthlyMap.get(ym).income, expense:monthlyMap.get(ym).expense })), incomeCategories: incomeCatMap, expenseCategories: expenseCatMap };
    }
    
    function parseTransactions(rows) {
        let hIdx = rows.findIndex(row => {
            if (!Array.isArray(row)) return false;
            const strRow = row.map(c => String(c || '').trim());
            return strRow.includes('날짜') && strRow.includes('대분류') && strRow.includes('금액');
        });
        if (hIdx === -1) return [];
        const h = rows[hIdx].map(h => String(h || '').trim());
        const dIdx = h.indexOf('날짜'), cIdx = h.indexOf('대분류'), coIdx = h.indexOf('내용'), aIdx = h.indexOf('금액');
        
        let tIdx = h.indexOf('타입');
        if (tIdx === -1) tIdx = h.indexOf('수입/지출');
        if (tIdx === -1) tIdx = h.findIndex(c => c.includes('분류') && c !== '대분류' && c !== '소분류');
        
        let hiddenIdx = h.findIndex(c => c.includes('숨김'));
        if (hiddenIdx === -1) hiddenIdx = h.findIndex(c => c === '상태');

        if ([dIdx, cIdx, aIdx].includes(-1)) return [];
        const txs = [];
        
        for (let i = hIdx + 1; i < rows.length; i++) {
            const r = rows[i]; if (!Array.isArray(r) || r.length <= Math.max(dIdx, cIdx, aIdx)) continue;
            
            const contentStr = String(r[coIdx]||'').trim();
            const catStr = String(r[cIdx]||'').trim();
            const typeStr = tIdx !== -1 ? String(r[tIdx]||'').trim() : '미분류';
            
            let isHidden = false;
            if (hiddenIdx !== -1 && String(r[hiddenIdx]||'').includes('숨김')) isHidden = true;
            if (contentStr.includes('(숨김)') || contentStr.includes('[숨김]')) isHidden = true;
            if (catStr.includes('(숨김)') || catStr.includes('[숨김]')) isHidden = true;

            if (EXCLUDED_KEYWORDS.some(k => catStr.includes(k) || typeStr.includes(k))) isHidden = true;

            const amt = parseNumber(r[aIdx]); if (amt == null) continue;
            let date = String(r[dIdx] || '');
            if (typeof r[dIdx] === 'number') { const d = XLSX.SSF.parse_date_code(r[dIdx]); if (d) date = `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`; }
            else if (r[dIdx] instanceof Date) date = r[dIdx].toISOString().split('T')[0];
            
            if (/^\d{4}-\d{2}-\d{2}$/.test(date)) {
                txs.push({ date, category: catStr || '미분류', content: contentStr, amount: amt, type: typeStr, isHidden: isHidden });
            }
        }
        return txs;
    }

    // ===== Rendering Functions =====
    function renderSummary(assets, liabilities, isShared) {
        const aSum = assets.reduce((s, r) => s + r.금액, 0), lSum = liabilities.reduce((s, r) => s + r.금액, 0);
        const card = (l, v, c) => `<div class="card p-5"><p class="text-sm text-slate-500 mb-1">${l}</p><p class="text-2xl font-bold ${c}">${fmtWon(v)}</p></div>`;
        document.getElementById('summary').innerHTML = [card('자산 합계', aSum, 'text-emerald-600'), card('총 부채', lSum, 'text-rose-600'), card('순자산', aSum - lSum, 'text-sky-600')].join('');
    }

    function renderCharts(assets, liabilities) {
        if (!window.Chart) return;
        const aSum = assets.reduce((s, r) => s + r.금액, 0), lSum = liabilities.reduce((s, r) => s + r.금액, 0);
        
        if(charts.pie) charts.pie.destroy();
        if(charts.barAsset) charts.barAsset.destroy();
        
        document.getElementById('charts').innerHTML = `<div class="card p-4 lg:col-span-1"><h3>자산 비중</h3><div class="h-64"><canvas id="pieTotal"></canvas></div></div><div class="card p-4 lg:col-span-2"><h3>항목별 자산</h3><div class="h-64"><canvas id="barAsset"></canvas></div></div>`;
        
        charts.pie = new Chart(document.getElementById('pieTotal'), { 
            type: 'doughnut', 
            data: { labels: ['자산', '부채'], datasets: [{ data: [aSum, lSum], backgroundColor: ['#10b981', '#f43f5e'], borderWidth: 0 }] }, 
            options: { 
                maintainAspectRatio: false,
                plugins: {
                    datalabels: {
                        color: '#fff',
                        font: { weight: 'bold', size: 12 },
                        formatter: (value, ctx) => {
                            const total = aSum + lSum;
                            if (total === 0) return null;
                            const pct = Math.round((value / total) * 100);
                            return pct >= 5 ? pct + '%' : null; 
                        }
                    }
                }
            } 
        });

        const cats = computeCategoryTotals(assets);
        charts.barAsset = new Chart(document.getElementById('barAsset'), { 
            type: 'bar', 
            data: { labels: cats.map(c => c[0]), datasets: [{ data: cats.map(c => c[1]), backgroundColor: '#38bdf8', borderRadius: 4 }] }, 
            options: { 
                indexAxis: 'y', 
                maintainAspectRatio: false,
                plugins: { datalabels: { display: false } }
            } 
        });
    }

    function renderGroupedTable(title, items) {
        const groups = new Map();
        for (const it of items) {
            const key = it.항목명 || '기타';
            if (!groups.has(key)) groups.set(key, []);
            groups.get(key).push(it);
        }
        if (items.length === 0) return `<div class="mb-4"><h3 class="font-bold mb-2 text-rose-700">${title}</h3><p class="text-sm text-slate-500">데이터가 없습니다.</p></div>`;

        let html = `<div class="mb-4"><h3 class="font-bold mb-2 text-rose-700">${title}</h3>`;
        for (const [cat, rows] of groups.entries()) {
            const sub = rows.reduce((s, r) => s + r.금액, 0);
            html += `<div class="border rounded mb-2 overflow-hidden"><div class="p-2 bg-slate-50 text-sm flex justify-between font-bold"><span>${cat}</span><span>소계: ${fmtWon(sub)}</span></div><table class="w-full text-xs">`;
            for (const r of rows) html += `<tr class="border-t"><td class="p-2">${r.상품명}</td><td class="p-2 text-right">${fmtWon(r.금액)}</td></tr>`;
            html += `</table></div>`;
        }
        return html + `</div>`;
    }

    function renderAssetGroupedTableWithCheckboxes(title, items, selectedSet) {
        const groups = new Map();
        for (const it of items) {
            const key = it.항목명 || '기타';
            if (!groups.has(key)) groups.set(key, []);
            groups.get(key).push(it);
        }
        if (items.length === 0) return `<div class="mb-4"><h3 class="font-bold mb-2 text-sky-700">${title}</h3><p class="text-sm text-slate-500">데이터가 없습니다.</p></div>`;

        let html = `<div class="mb-4"><h3 class="font-bold mb-2 text-sky-700">${title}</h3>`;
        for (const [cat, rows] of groups.entries()) {
            const sub = rows.reduce((s, r) => s + r.금액, 0);
            html += `<div class="border rounded mb-2 overflow-hidden"><div class="p-2 bg-slate-50 text-sm flex justify-between font-bold"><span>${cat}</span><span>소계: ${fmtWon(sub)}</span></div><table class="w-full text-xs">`;
            for (const r of rows) {
                html += `<tr class="border-t"><td class="p-2 flex items-center gap-2"><input type="checkbox" class="asset-select cursor-pointer" data-id="${r.id}" ${selectedSet.has(r.id)?'checked':''}>${r.상품명}</td><td class="p-2 text-right">${fmtWon(r.금액)}</td></tr>`;
            }
            html += `</table></div>`;
        }
        return html + `</div>`;
    }

    function renderCashflowSummary(cf) {
        const wrap = document.getElementById('cashflow-summary'); if (!wrap) return;
        if (!cf || !cf.monthly || cf.monthly.length === 0) { wrap.innerHTML = `<p>데이터 없음</p>`; return; }
        const sumI = cf.monthly.reduce((s, m) => s + m.income, 0), sumE = cf.monthly.reduce((s, m) => s + m.expense, 0);
        const avgI = sumI / cf.monthly.length, avgE = sumE / cf.monthly.length;
        const card = (label, value, vc = '') => `<div class="card p-4"><p class="text-sm text-slate-500">${label}</p><p class="text-xl font-bold mt-1 ${vc}">${value}</p></div>`;
        wrap.innerHTML = [ card('월평균 수입', fmtWon(avgI), 'text-emerald-600'), card('월평균 지출', fmtWon(avgE), 'text-rose-600'), card('평균 순흐름', fmtWon(avgI - avgE)), card('분석 기간', `${cf.monthly.length}개월`) ].join('');
    }
    
    function renderCashflowDetails(cf){
        const wrap = document.getElementById('cashflow'); if (!wrap) return;
        wrap.innerHTML = `<div class="grid grid-cols-1 lg:grid-cols-2 gap-6"><div class="card p-4"><h3>월별 흐름</h3><div class="h-72"><canvas id="cfMonthly"></canvas></div></div><div class="card p-4"><h3>상위 지출 차트</h3><div class="h-72"><canvas id="cfCat"></canvas></div></div></div><div class="mt-6"><div class="flex justify-between items-center mb-4"><h3>상세 내역 (월 선택 시 차트 반영)</h3><select id="month-selector" class="border border-slate-300 rounded px-3 py-1 font-semibold text-slate-700 bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-sky-500"><option value="overall">전체 기간</option>${cf.monthly.map(m => `<option value="${m.ym}">${m.ym}</option>`).join('')}</select></div><div id="monthly-category-summary"></div></div>`;
        
        if(charts.cfMonthly) charts.cfMonthly.destroy();

    function renderCategoryTables(sm) {
        const container = document.getElementById('monthly-category-summary'); if (!container || !window.__cf) return;
        let iD, eD;
        
        if (sm === 'overall') { 
            iD = window.__cf.incomeCategories; 
            eD = window.__cf.expenseCategories; 
        } else {
            iD = new Map(); eD = new Map();
            (window.__transactions || []).filter(tx => parseMonthLike(tx.date) === sm && !tx.isHidden).forEach(tx => { 
                const amt = Math.abs(tx.amount || 0); 
                if(tx.type === '수입') iD.set(tx.category, (iD.get(tx.category)||0) + amt); 
                else eD.set(tx.category, (eD.get(tx.category)||0) + amt); 
            });
        }
        
        const iDPairs = [...iD.entries()].sort((a,b)=>b[1]-a[1]);
        const eDPairs = [...eD.entries()].sort((a,b)=>b[1]-a[1]);

        const createT = (title, pairs, color) => {
            const totalSum = pairs.reduce((sum, item) => sum + item[1], 0);
            return `
            <div class="card overflow-hidden">
                <div class="p-3 bg-slate-50 font-semibold">${title}</div>
                <table class="w-full text-sm">
                    <tbody>
                    ${pairs.map(([c, a]) => `<tr class="border-t category-row cursor-pointer hover:bg-slate-50 transition-colors" data-category="${c}" data-type="${title.includes('수입')?'수입':'지출'}"><td class="p-3">${c}</td><td class="p-3 text-right font-medium ${color}">${fmtWon(a)}</td></tr>`).join('')}
                    </tbody>
                    <tfoot class="bg-slate-100 border-t-2 border-slate-200 font-bold">
                        <tr>
                            <td class="p-3">총합</td>
                            <td class="p-3 text-right ${color}">${fmtWon(totalSum)}</td>
                        </tr>
                    </tfoot>
                </table>
            </div>`;
        }

        container.innerHTML = `<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">${createT('수입 요약', iDPairs, 'text-emerald-600')}${createT('지출 요약', eDPairs, 'text-rose-600')}</div>`;

        if (window.Chart) {
            const canvasEl = document.getElementById('cfCat');
            if (canvasEl) {
                if(charts.cfCat) charts.cfCat.destroy();
                
                let pieLabels = [];
                let pieData = [];
                
                if (eDPairs.length > 7) {
                    const top7 = eDPairs.slice(0, 7);
                    const othersSum = eDPairs.slice(7).reduce((sum, item) => sum + item[1], 0);
                    pieLabels = top7.map(c => c[0]).concat(['기타']);
                    pieData = top7.map(c => c[1]).concat([othersSum]);
                } else {
                    pieLabels = eDPairs.map(c => c[0]);
                    pieData = eDPairs.map(c => c[1]);
                }

                charts.cfCat = new Chart(canvasEl, {
                    type: 'doughnut',
                    data: {
                        labels: pieLabels,
                        datasets: [{ 
                            data: pieData, 
                            backgroundColor: ['#f43f5e','#f97316','#f59e0b','#eab308','#84cc16','#22c55e','#10b981','#94a3b8'], 
                            borderWidth: 2,
                            borderColor: '#ffffff'
                        }]
                    },
                    options: {
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'right', 
                                labels: { boxWidth: 12, padding: 10, font: { size: 11, family: "'Inter', 'Noto Sans KR', sans-serif" } }
                            },
                            tooltip: {
                                callbacks: {
                                    label: function(ctx) {
                                        const total = ctx.chart.data.datasets[0].data.reduce((a, b) => a + b, 0);
                                        const val = ctx.parsed;
                                        const pct = total > 0 ? Math.round((val / total) * 100) : 0;
                                        return ` ${ctx.label}: ${fmtWon(val)} (${pct}%)`;
                                    }
                                }
                            },
                            datalabels: {
                                color: '#fff',
                                font: { weight: 'bold', size: 11 },
                                formatter: (value, ctx) => {
                                    const total = ctx.chart.data.datasets[0].data.reduce((a, b) => a + b, 0);
                                    if(total === 0) return null;
                                    const pct = Math.round((value / total) * 100);
                                    return pct >= 5 ? pct + '%' : null; 
                                }
                            }
                        },
                        onClick: (e, elements) => {
                            if (elements.length > 0) {
                                const chart = elements[0].element.$context.chart;
                                const cat = chart.data.labels[elements[0].index];
                                if (cat !== '기타') { 
                                    showTransactionModal(cat, '지출');
                                }
                            }
                        }
                    }
                });
            }
        }
    }

    function showTransactionModal(cat, type) {
        const ms = document.getElementById('month-selector'); const sm = ms ? ms.value : 'overall';
        
        let filtered = (window.__transactions || []).filter(tx => {
            if (tx.isHidden) return false;
            const monthMatch = (sm === 'overall' || parseMonthLike(tx.date) === sm);
            const catMatch = (tx.category === cat);
            const typeMatch = (type === '수입') ? (tx.type === '수입') : (tx.type !== '수입'); 
            return monthMatch && catMatch && typeMatch;
        }).sort((a, b) => Math.abs(b.amount || 0) - Math.abs(a.amount || 0)); 
        
        document.getElementById('modal-title').textContent = `'${cat}' 상세 내역 (${filtered.length}건)`;
        
        if (filtered.length === 0) {
            document.getElementById('modal-body').innerHTML = '<p class="text-slate-500 py-6 text-center">해당 조건에 맞는 내역이 없습니다.</p>';
        } else {
            document.getElementById('modal-body').innerHTML = `<table class="w-full text-sm"><thead><tr class="bg-slate-100 text-slate-600"><th class="p-3 text-left">날짜</th><th class="p-3 text-left">내용</th><th class="p-3 text-right">금액</th></tr></thead><tbody>${filtered.map(tx => `<tr class="border-t border-slate-200 hover:bg-slate-50"><td class="p-3 whitespace-nowrap text-slate-500">${tx.date}</td><td class="p-3 font-medium">${tx.content}</td><td class="p-3 text-right font-bold text-slate-700">${fmtWon(Math.abs(tx.amount))}</td></tr>`).join('')}</tbody></table>`;
        }
        document.getElementById('transaction-modal').classList.remove('hidden');
    }

    // 🔥 고유 이름이 반영된 드롭다운 생성

            let html = '<option value="all">전체 합산</option>';

                html += `<option value="${fn}">${fn}의 자산</option>`;

            fs.classList.remove('hidden');

    // 🔥 드롭다운 선택 시 실행 (개별 파일 데이터만 필터링해서 렌더링)
    function renderAssetUpdatesOnly() {
        if (!window.__data) return;
        
        const fs = document.getElementById('file-selector');
        const selectedFile = (fs && !fs.classList.contains('hidden')) ? fs.value : 'all';

        let fAssets = window.__data.assets;
        let fLiabs = window.__data.liabilities;

        if (selectedFile !== 'all') {
            fAssets = fAssets.filter(a => a.fileName === selectedFile);
            fLiabs = fLiabs.filter(l => l.fileName === selectedFile);
        }

        const sel = fAssets.filter(it => window.__data.selectedAssetIds.has(it.id));
        
        renderSummary(sel, fLiabs, window.__isSharedUrlData);
        renderCharts(sel, fLiabs);
        
        const titleSuffix = selectedFile === 'all' ? '(전체 합산)' : `(${selectedFile})`;
        const aTable = renderAssetGroupedTableWithCheckboxes(`자산 현황 ${titleSuffix}`, fAssets, window.__data.selectedAssetIds);

        document.getElementById('result-tables').innerHTML = `<div class="grid grid-cols-1 lg:grid-cols-2 gap-6"><div>${aTable}</div><div>${lTable}</div></div>`;

    function renderAll() {
        updateFileSelectorUI();
        renderAssetUpdatesOnly();
        if (window.__cf) { 
            renderCashflowSummary(window.__cf); 
            renderCashflowDetails(window.__cf); 
        }
    }

    // ===== 🚀 Sync & Load =====
    async function syncToGist() {
        let localToken = localStorage.getItem('pingu_github_token') || GITHUB_TOKEN;
        if (!localToken) {
            localToken = prompt("보안 연결을 위해 발급받은 GitHub Personal Access Token (ghp_...)을 입력해주세요.\n※ 브라우저에만 안전하게 저장됩니다.");
            if (!localToken) { showMessage("안내", "토큰 입력 취소."); return; }
            localStorage.setItem('pingu_github_token', localToken.trim());
        }

        const btn = document.getElementById('exportBtn');
        try {
            btn.disabled = true; btn.innerText = "동기화 중...";
            const payload = { 
                data: { 
                    a: window.__data.assets, 
                    l: window.__data.liabilities, 
                    s: Array.from(window.__data.selectedAssetIds),
                    f: window.__data.fileNames || [] 
                }, 
                cf: window.__cf ? { 
                    m: window.__cf.monthly, 
                    i: Array.from(window.__cf.incomeCategories), 
                    e: Array.from(window.__cf.expenseCategories) 
                } : null, 
                t: window.__transactions || [] 
            };
            const method = GIST_ID ? 'PATCH' : 'POST';
            const url = GIST_ID ? `https://api.github.com/gists/${GIST_ID}` : 'https://api.github.com/gists';
            
            const res = await fetch(url, { method, headers: { 'Authorization': `token ${localToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ description: "Pingu Data", public: false, files: { "pingu_data.json": { content: JSON.stringify(payload) } } }) });
            if (!res.ok) {
                if (res.status === 401 || res.status === 403 || res.status === 404) {
                    localStorage.removeItem('pingu_github_token'); GIST_ID = ""; localStorage.removeItem('pingu_gist_id');
                    throw new Error("토큰이 만료되었거나 권한이 없습니다. 다시 시도하여 새로운 토큰을 입력해주세요.");
                }
                throw new Error("동기화 통신 오류");
            }
            const d = await res.json();
            GIST_ID = d.id; localStorage.setItem('pingu_gist_id', GIST_ID); 
            const sUrl = new URL(window.location.href); sUrl.searchParams.set('gist', GIST_ID);
            showMessage("동기화 완료", `<p class="mb-2 text-sm">데이터 덮어쓰기 완료! 아래 링크를 카카오톡 공지에 올리세요.</p><input id="sur" value="${sUrl}" class="w-full border p-3 rounded text-xs font-mono mb-3 bg-slate-50 text-sky-800" readonly><button onclick="document.getElementById('sur').select();document.execCommand('copy');this.innerText='복사완료!'" class="btn btn-primary w-full p-3">링크 복사하기</button>`);
        } catch (e) { showMessage("동기화 실패", `<p class="text-red-500">${e.message}</p>`); } finally { btn.disabled = false; btn.innerHTML = "🚀 클라우드 동기화"; }
    }

    async function loadFromGist(id) {
        try {
            document.getElementById('upload-ui').classList.add('hidden');
            document.getElementById('shared-loading-ui').classList.remove('hidden');
            const res = await fetch(`https://api.github.com/gists/${id}`);
            if (!res.ok) throw new Error("데이터를 찾을 수 없습니다.");
            const gist = await res.json();
            const payload = JSON.parse(gist.files['pingu_data.json'].content);
            window.__isSharedUrlData = true;
            window.__data = { 
                assets: payload.data.a, 
                liabilities: payload.data.l, 
                selectedAssetIds: new Set(payload.data.s),
                fileNames: payload.data.f || []
            };
            if (payload.cf) window.__cf = { monthly: payload.cf.m, incomeCategories: new Map(payload.cf.i), expenseCategories: new Map(payload.cf.e) };
            window.__transactions = payload.t;
            
            document.getElementById('upload-section').classList.add('hidden');
            document.getElementById('results-section').classList.remove('hidden');
            const eBtn = document.getElementById('exportBtn'); if(eBtn) eBtn.style.display = 'none';
            renderAll();
        } catch (e) { alert("공유 데이터 오류.\n" + e.message); window.location.href = window.location.pathname; }
    }

    async function run() {
        const btn = document.getElementById('runBtn');
        try {
            btn.disabled = true; setStatus(true, "파일 읽는 중...");
            const f1 = document.getElementById('file1').files[0], f2 = document.getElementById('file2').files[0];
            if (!f1 && !f2) throw new Error("파일을 하나 이상 선택하세요.");
            const files = [f1, f2].filter(Boolean);
            const pFS = [], pCF = [], allT = [];
            
            for (let i = 0; i < files.length; i++) {
                let f = files[i];
                // 🔥 만약 파일 이름이 같더라도 완벽하게 구별되도록 앞에 [1], [2]를 강제 삽입
                let uniqueName = files.length > 1 ? `[${i+1}] ${f.name}` : f.name;

                const buf = await readFileAsArrayBuffer(f);
                const wb = XLSX.read(buf, { type: 'array', cellDates: true });
                
                const sFS = pickBangsaelSheet(wb, '뱅샐현황');
                if (sFS) {
                    const rowsRaw = XLSX.utils.sheet_to_json(sFS, { header: 1, raw: true });
                    const rowsVal = XLSX.utils.sheet_to_json(sFS, { header: 1 });
                    pFS.push(parseFinancialStatus(rowsRaw, uniqueName));
                    const cfData = parseCashflowMatrix(rowsVal, 0, 500);
                    if (cfData) pCF.push(cfData);
                }
                
                const sTX = pickBangsaelSheet(wb, '가계부 내역');
                if (sTX) allT.push(...parseTransactions(XLSX.utils.sheet_to_json(sTX, { header: 1 })));
            }
            
            let a = [], l = [];
            pFS.forEach(r => { if(r.assets) a = a.concat(r.assets); if(r.liabilities) l = l.concat(r.liabilities); });
            a.forEach((it, i) => it.id = 'A' + i);
            
            window.__data = { 
                assets: a, 
                liabilities: l, 
                selectedAssetIds: new Set(a.map(it => it.id)),
                fileNames: files.length > 1 ? files.map((f, i) => `[${i+1}] ${f.name}`) : files.map(f => f.name)
            };
            window.__cf = mergeCashflowResults(pCF);
            window.__transactions = allT;
            
            window.__isSharedUrlData = false; 
            document.getElementById('upload-section').classList.add('hidden');
            document.getElementById('results-section').classList.remove('hidden');
            renderAll();
            setStatus(false, "");
        } catch (e) { __log(e); setStatus(false, "오류: " + e.message); } finally { btn.disabled = false; }
    }

    function initApp() {
        setupUI();
        
        const gistId = new URLSearchParams(window.location.search).get('gist');
        if (gistId) loadFromGist(gistId);
        else document.getElementById('upload-section').classList.remove('hidden');
        
        document.getElementById('runBtn').onclick = run;
        document.getElementById('exportBtn').onclick = syncToGist;
        document.getElementById('resetBtn').onclick = () => window.location.href = window.location.pathname;

        document.body.addEventListener('change', (e) => {
            if (e.target.classList.contains('asset-select')) {
                const id = e.target.getAttribute('data-id');
                if (window.__data) {
                    if (e.target.checked) window.__data.selectedAssetIds.add(id);
                    else window.__data.selectedAssetIds.delete(id);
                    renderAssetUpdatesOnly(); 
                }
            } 
            else if (e.target.id === 'month-selector') {
                renderCategoryTables(e.target.value);
            }
        });
        
        document.getElementById('results-section').addEventListener('click', (e) => {
            const row = e.target.closest('.category-row');
            if (row) showTransactionModal(row.dataset.category, row.dataset.type);
        });
    }

    initApp();
  </script>
</body>
</html>
